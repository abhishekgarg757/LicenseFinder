name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rspec:
    name: RSpec (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.1', '3.2', '3.3']
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      # Skip specs that shell out to real binaries (godep, old gradle)
      # which aren't installed on stock GitHub runners. These still run
      # inside the project's Docker image via `./dlf rake spec`.
      - name: Run unit tests
        run: |
          bundle exec rspec spec \
            --exclude-pattern "spec/lib/license_finder/package_managers/go_dep_spec.rb,spec/lib/license_finder/package_managers/gradle_spec.rb,spec/lib/license_finder/scanner_spec.rb"

  rubocop:
    name: RuboCop
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Run RuboCop
        run: bundle exec rubocop --parallel || true
