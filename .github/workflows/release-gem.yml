name: Release gem

on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Build gem
        run: gem build license_finder.gemspec
      - name: Publish to RubyGems (trusted publisher)
        uses: rubygems/release-gem@v1
