require:
  - rubocop-performance

AllCops:
  TargetRubyVersion: 3.1
  NewCops: disable
  SuggestExtensions: false
  Exclude:
    - 'lib/license_finder/reports/**/*'
    - 'features/fixtures/**/*'
    - 'spec/fixtures/**/*'
    - 'tmp/**/*'
    - 'vendor/**/*'
    - 'pkg/**/*'
    - 'Gemfile'

# ---------------------------------------------------------------------------
# Layout
# ---------------------------------------------------------------------------
Layout/HeredocIndentation:
  Enabled: false
Layout/EmptyLinesAroundArguments:
  Enabled: false
Layout/MultilineMethodCallIndentation:
  Enabled: false
Layout/LineLength:
  Max: 200

# ---------------------------------------------------------------------------
# Lint
# ---------------------------------------------------------------------------
Lint/AmbiguousRegexpLiteral:
  Enabled: false
Lint/MixedRegexpCaptureTypes:
  Enabled: false
Lint/MissingSuper:
  Enabled: false
Lint/EmptyFile:
  Enabled: false
Lint/RedundantStringCoercion:
  Exclude:
    - 'examples/**/*'

# ---------------------------------------------------------------------------
# Metrics
# ---------------------------------------------------------------------------
Metrics/AbcSize:
  Max: 35
Metrics/BlockLength:
  Enabled: false
Metrics/ClassLength:
  Enabled: false
Metrics/CyclomaticComplexity:
  Max: 15
Metrics/PerceivedComplexity:
  Max: 15
Metrics/MethodLength:
  Enabled: false
Metrics/ModuleLength:
  Enabled: false
Metrics/ParameterLists:
  Max: 8

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
Security/YAMLLoad:
  Enabled: false
Security/Open:
  Enabled: false

# ---------------------------------------------------------------------------
# Naming
# ---------------------------------------------------------------------------
Naming/VariableNumber:
  Enabled: false
Naming/FileName:
  Exclude:
    - '**/Rakefile'
    - '**/Gemfile'
    - '**/Podfile'

# ---------------------------------------------------------------------------
# Style
# ---------------------------------------------------------------------------
Style/OptionalBooleanParameter:
  Enabled: false
Style/MissingRespondToMissing:
  Enabled: false
Style/FormatStringToken:
  EnforcedStyle: unannotated
Style/HashEachMethods:
  Enabled: true
Style/HashTransformKeys:
  Enabled: true
Style/HashTransformValues:
  Enabled: true
Style/DoubleNegation:
  Enabled: false
Style/Documentation:
  Enabled: false
Style/ModuleFunction:
  Enabled: false
  EnforcedStyle: extend_self
Style/FrozenStringLiteralComment:
  Enabled: false

# ---------------------------------------------------------------------------
# Gemspec
# ---------------------------------------------------------------------------
Gemspec/RequireMFA:
  Enabled: false
Gemspec/DevelopmentDependencies:
  Enabled: false
